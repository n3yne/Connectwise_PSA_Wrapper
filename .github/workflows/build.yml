name: Build & Release

on:
  push:
    tags:
      - 'v*'          # Triggers on version tags like v0.0.1, v1.0.0, etc.
  workflow_dispatch:   # Allows manual trigger from GitHub Actions tab

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write  # Needed to create releases and upload assets

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build portable EXE
        run: npm run build
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'   # Skip code signing

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ConnectWise-ManagePP-portable
          path: dist/*.exe
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ConnectWise Manage++ ${{ github.ref_name }}
          body: |
            ## ConnectWise Manage++ ${{ github.ref_name }}

            Portable Windows executable — no installation required.
            Download the `.exe` below and run it directly.
          draft: false
          prerelease: false
          files: dist/*.exe
