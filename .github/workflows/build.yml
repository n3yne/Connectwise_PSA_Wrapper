name: Build & Release

on:
  push:
    tags:
      - 'v*'          # Triggers on version tags like v0.0.1, v1.0.0, etc.
  workflow_dispatch:   # Allows manual trigger from GitHub Actions tab

jobs:
  build-windows:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build portable EXE
        run: npx electron-builder --win --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/*.exe
          retention-days: 90

  build-mac:
    runs-on: macos-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

            - name: Build macOS DMG
        run: npx electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: dist/*.dmg
          retention-days: 90

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: artifacts/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-build
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ConnectWise Manage++ ${{ github.ref_name }}
          body: |
            ## ConnectWise Manage++ ${{ github.ref_name }}

            ### Downloads
            - **Windows** — Portable `.exe`, no installation required
            - **macOS** — `.dmg` disk image, drag to Applications to install
          draft: false
          prerelease: false
          files: artifacts/*
