<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ConnectWise Manage++</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- ====== MAIN LAYOUT ====== -->
  <div id="app-container">
    
        <!-- ConnectWise Webview Area -->
    <div id="webview-area">
      <!-- Tab Bar -->
      <div id="tab-bar">
        <div id="tab-list"></div>
        <button id="btn-new-tab" title="New tab">+</button>
      </div>
      <!-- Webview Container (webviews are added/removed dynamically) -->
      <div id="webview-container"></div>
    </div>

    <!-- Resize Handle -->
    <div id="resize-handle" title="Drag to resize"></div>

    <!-- Side Panel -->
    <div id="side-panel">
      
      <!-- Panel Header -->
      <div id="panel-header">
        <h2>📋 Note Backup</h2>
        <div id="panel-header-buttons">
          <button id="btn-toggle-panel" title="Collapse panel">◀</button>
        </div>
      </div>

      <!-- Panel Content -->
      <div id="panel-content">

                <!-- Ticket ID -->
        <div class="form-group">
          <label for="ticket-id">Ticket / Reference ID</label>
          <div class="input-with-button">
            <input type="text" id="ticket-id" placeholder="e.g. SR-123456 or any label" />
            <button id="btn-grab-ticket" class="btn btn-small" title="Grab ticket number from the currently open ConnectWise page">🎯 Grab</button>
          </div>
        </div>

                <!-- Note Editor -->
        <div class="form-group note-group">
          <label>Notes</label>
          <!-- Formatting Toolbar -->
          <div id="editor-toolbar">
            <button class="toolbar-btn" data-command="bold" title="Bold (Ctrl+B)"><b>B</b></button>
            <button class="toolbar-btn" data-command="italic" title="Italic (Ctrl+I)"><i>I</i></button>
            <button class="toolbar-btn" data-command="underline" title="Underline (Ctrl+U)"><u>U</u></button>
            <button class="toolbar-btn" data-command="strikeThrough" title="Strikethrough"><s>S</s></button>
            <span class="toolbar-sep"></span>
            <button class="toolbar-btn" data-command="insertUnorderedList" title="Bullet List">&#8226; List</button>
            <button class="toolbar-btn" data-command="insertOrderedList" title="Numbered List">1. List</button>
            <span class="toolbar-sep"></span>
            <button class="toolbar-btn" data-command="formatBlock" data-value="h3" title="Heading">H</button>
            <button class="toolbar-btn" data-command="formatBlock" data-value="blockquote" title="Quote">&ldquo;</button>
            <button class="toolbar-btn" data-command="removeFormat" title="Clear Formatting">&oslash;</button>
          </div>
          <!-- Rich Text Editor -->
          <div id="note-content" contenteditable="true" data-placeholder="Type or paste your ticket notes here. You can use formatting and paste images..."></div>
        </div>

        <!-- Status Bar -->
        <div id="status-bar">
          <span id="autosave-status">Ready</span>
        </div>

        <!-- Action Buttons -->
        <div id="action-buttons">
          <button id="btn-save" class="btn btn-primary" title="Save a timestamped backup">💾 Save Snapshot</button>
          <button id="btn-clear" class="btn btn-warning" title="Clear current note">🗑️ Clear</button>
          <button id="btn-copy" class="btn btn-secondary" title="Copy notes to clipboard">📋 Copy</button>
        </div>

        <!-- Divider -->
        <hr class="divider" />

        <!-- History / Restore Section -->
        <div id="history-section">
          <div id="history-header">
            <h3>📂 Saved Snapshots</h3>
            <button id="btn-open-folder" class="btn btn-small" title="Open backup folder">📁 Open Folder</button>
          </div>
          
          <!-- Saved Tickets List -->
          <div id="saved-tickets">
            <label>Saved Tickets:</label>
            <select id="ticket-select">
              <option value="">-- Select a ticket --</option>
            </select>
            <button id="btn-load-history" class="btn btn-small">Load History</button>
            <button id="btn-delete-ticket" class="btn btn-small btn-delete" title="Delete all saved data for the selected ticket">🗑️ Delete</button>
          </div>

          <div id="history-list">
            <!-- Populated dynamically -->
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- Collapsed Panel Toggle (shown when panel is hidden) -->
  <button id="btn-expand-panel" class="expand-btn" title="Open Note Backup panel">▶<br/>N<br/>O<br/>T<br/>E<br/>S</button>

  <script src="renderer.js"></script>
</body>
</html>
